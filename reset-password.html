<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Bahari Fresh</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0c4a7a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ocean: #0c4a7a;
            --ocean-mid: #1668a8;
            --accent: #2f9fd6;
            --foam: #eef5fb;
            --gold: #e8a832;
            --ink: #1a1a18;
            --danger: #c0392b;
        }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-mid) 55%, var(--accent) 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; position: relative; overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .container {
            position: relative; z-index: 1;
            background: white; padding: 44px 38px;
            border-radius: 28px; text-align: center;
            width: 100%; max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
        }
        .lock-badge {
            width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(135deg, var(--ocean), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.7rem; margin: 0 auto 18px;
            box-shadow: 0 10px 22px rgba(12,74,122,0.3);
        }
        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--ocean); font-size: 1.5rem; margin-bottom: 6px;
        }
        .subtitle { color: #aaa; font-size: 0.85rem; margin-bottom: 26px; }
        .field { text-align: left; margin-bottom: 14px; }
        .field label { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 5px; }
        input {
            width: 100%; padding: 13px 16px;
            border-radius: 12px; border: 1.5px solid #e0e6eb;
            font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
            outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--ocean); }
        button {
            width: 100%; padding: 15px; margin-top: 8px;
            background: linear-gradient(135deg, var(--ocean), var(--ocean-mid));
            color: white; border: none; border-radius: 14px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
            font-family: 'DM Sans', sans-serif; transition: opacity 0.25s;
        }
        button:hover:not(:disabled) { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .message {
            margin-top: 16px; font-size: 0.85rem;
            padding: 10px 14px; border-radius: 10px; display: none;
        }
        .message.show { display: block; }
        .message.ok { background: #e8f5e9; color: #2e7d32; }
        .message.err { background: #fdf0ee; color: var(--danger); }
        .footnote { margin-top: 24px; font-size: 0.78rem; color: #bbb; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <div class="lock-badge">🔒</div>
    <h2>Set New Password</h2>
    <p class="subtitle">Choose a strong password for your Bahari Fresh account</p>

    <div class="field">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="At least 6 characters" required>
    </div>
    <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
    </div>
    <button id="updateBtn" onclick="updatePassword()">Update Password</button>
    <div id="message" class="message"></div>

    <div class="footnote">🌊 Bahari Fresh — Premium Seafood</div>
</div>
<script>
    const SUPABASE_URL = 'https://qhpzqtwzifgthwovkpwp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFocHpxdHd6aWZndGh3b3ZrcHdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjkzMzMsImV4cCI6MjA4ODQwNTMzM30.rgo0X-UWShZAAyvi9hRqSka44ZIJ-2GlvTNsxkFBKgU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function updatePassword() {
        const newPass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        const btn = document.getElementById('updateBtn');

        if (!newPass || newPass.length < 6) { showMessage("Password must be at least 6 characters", true); return; }
        if (newPass !== confirm) { showMessage("Passwords do not match", true); return; }

        btn.disabled = true; btn.innerText = 'Updating…';
        const { error } = await _supabase.auth.updateUser({ password: newPass });
        btn.disabled = false; btn.innerText = 'Update Password';

        if (error) showMessage(error.message, true);
        else showMessage("✅ Password updated! You can now login.", false);
    }

    function showMessage(msg, isError) {
        const div = document.getElementById('message');
        div.innerText = msg;
        div.className = 'message show ' + (isError ? 'err' : 'ok');
    }
</script>
</body>
</html>
