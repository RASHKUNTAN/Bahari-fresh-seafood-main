<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Bahari Fresh</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a5c4b">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #f9f7f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 32px; width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #0a5c4b; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 60px; border: 1px solid #ddd; }
        button { width: 100%; padding: 14px; background: #0a5c4b; color: white; border: none; border-radius: 60px; cursor: pointer; }
        .message { margin-top: 15px; font-size: 14px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h2>Set New Password</h2>
    <input type="password" id="newPassword" placeholder="New Password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
    <button onclick="updatePassword()">Update Password</button>
    <div id="message" class="message"></div>
</div>
<script>
    const SUPABASE_URL = 'https://qhpzqtwzifgthwovkpwp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFocHpxdHd6aWZndGh3b3ZrcHdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjkzMzMsImV4cCI6MjA4ODQwNTMzM30.rgo0X-UWShZAAyvi9hRqSka44ZIJ-2GlvTNsxkFBKgU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    async function updatePassword() {
        const newPass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (!newPass || newPass.length < 6) { showMessage("Password must be at least 6 characters", true); return; }
        if (newPass !== confirm) { showMessage("Passwords do not match", true); return; }
        const { error } = await _supabase.auth.updateUser({ password: newPass });
        if (error) showMessage(error.message, true);
        else showMessage("✅ Password updated! You can now login.", false);
    }
    function showMessage(msg, isError) { const div = document.getElementById('message'); div.innerText = msg; div.style.color = isError ? 'red' : 'green'; }
</script>
</body>
</html>
